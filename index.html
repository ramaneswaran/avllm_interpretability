<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do Audio-Visual Large Language Models Really See and Hear?</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text2: #5a5a5a;
      --text3: #999;
      --border: #e5e5e5;
      --accent: #d85a30;
      --details-bg: #f5f5f5;
    }
    [data-theme="dark"] {
      --bg: #1a1915;
      --text: #e8e6df;
      --text2: #a8a49a;
      --text3: #6e6b63;
      --border: rgba(255,255,255,0.1);
      --accent: #f0997b;
      --details-bg: rgba(255,255,255,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      line-height: 1.7;
      transition: background 0.2s, color 0.2s;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      transition: background 0.2s;
    }
    .site-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.15s;
    }
    .toggle:hover { border-color: var(--text3); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 2rem 0 1.5rem;
    }
    .hero h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: var(--text);
      text-align: center;
    }
    .hero-authors { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .hero-names { font-size: 15px; color: var(--text2); max-width: 560px; line-height: 1.7; }
    .hero-names sup { font-size: 10px; }
    .hero-note { font-size: 12px; color: var(--text3); }
    .hero-affil { font-size: 15px; color: var(--text2); margin-top: 0.2rem; }
    .hero-venue { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-top: 0.5rem; letter-spacing: 0.01em; }
    .hero-links { display: flex; gap: 10px; margin-top: 1.25rem; }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--text);
      color: var(--bg);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .pill-btn:hover { opacity: 0.8; color: var(--bg); }

    /* Article layout */
    article {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 2rem 8rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* tl;dr */
    .tldr {
      display: flex;
      gap: 1.5rem;
      margin: 2rem 0 2.5rem;
    }
    .tldr-label {
      font-size: 13px;
      color: var(--text3);
      padding-top: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tldr-body {
      font-size: 16px;
      font-style: italic;
      color: var(--text2);
      line-height: 1.7;
    }

    /* Body text */
    p { margin-bottom: 1.4rem; font-size: 18px; color: var(--text); }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin: 3.5rem 0 0.75rem;
      color: var(--text);
    }
    h2 + hr { margin-top: 0.75rem; margin-bottom: 1.75rem; }

    a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    a:hover { color: var(--accent); }

    code {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      background: var(--border);
      padding: 2px 6px;
      border-radius: 3px;
    }

    /* Expandable sections */
    details { margin: 1.5rem 0; }
    summary {
      font-size: 15px;
      color: var(--accent);
      cursor: pointer;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: '→ '; }
    details[open] summary::before { content: '↓ '; }
    .details-body {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      background: var(--details-bg);
      border-radius: 6px;
      font-size: 15px;
      color: var(--text2);
      line-height: 1.65;
    }

    /* Video placeholder */
    .video-fig {
      background: var(--details-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 2rem;
      text-align: center;
      font-size: 14px;
      color: var(--text3);
      margin: 1.5rem 0;
      font-style: italic;
    }

    /* Placeholder text */
    .placeholder {
      color: var(--text3);
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="toggle" onclick="toggleTheme()" id="btn" style="margin-left:auto">
    <svg id="ico" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="8" cy="8" r="3.5"/>
      <line x1="8" y1="1" x2="8" y2="2.5"/>
      <line x1="8" y1="13.5" x2="8" y2="15"/>
      <line x1="1" y1="8" x2="2.5" y2="8"/>
      <line x1="13.5" y1="8" x2="15" y2="8"/>
      <line x1="3.1" y1="3.1" x2="4.2" y2="4.2"/>
      <line x1="11.8" y1="11.8" x2="12.9" y2="12.9"/>
      <line x1="3.1" y1="12.9" x2="4.2" y2="11.8"/>
      <line x1="11.8" y1="4.2" x2="12.9" y2="3.1"/>
    </svg>
    <span id="lbl">Dark</span>
  </button>
</div>

<article>
  <div class="hero">
    <h1>Do Audio-Visual Large Language Models Really See and Hear?</h1>

    <div class="hero-authors">
      <div class="hero-names">
        Ramaneswaran Selvakumar<sup>*</sup>,
        Kaousheik Jayakumar<sup>*</sup>,
        S Sakshi,
        Sreyan Ghosh,
        Ruohan Gao<sup>#</sup>,
        Dinesh Manocha<sup>#</sup>
      </div>
      <div class="hero-note"><sup>*</sup>Equal contribution &nbsp;&nbsp; <sup>#</sup>Equal advising</div>
      <div class="hero-affil">University of Maryland, College Park</div>
      <div class="hero-venue">CVPR Findings 2026</div>
      <div class="hero-links">
        <a href="#" class="pill-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
          Paper
        </a>
        <a href="#" class="pill-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .268.18.58.688.482C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          Code
        </a>
      </div>
    </div>
  </div>

  <hr>

<script>
  let dark = false;
  function toggleTheme() {
    dark = !dark;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
    document.getElementById('lbl').textContent = dark ? 'Light' : 'Dark';
    const ico = document.getElementById('ico');
    ico.setAttribute('fill', 'none');
    ico.setAttribute('stroke', 'currentColor');
    ico.setAttribute('stroke-width', '1.5');
    if (dark) {
      ico.innerHTML = '<path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a6 6 0 1 0 6.5 6.5z"/>';
    } else {
      ico.innerHTML = `
        <circle cx="8" cy="8" r="3.5"/>
        <line x1="8" y1="1" x2="8" y2="2.5"/>
        <line x1="8" y1="13.5" x2="8" y2="15"/>
        <line x1="1" y1="8" x2="2.5" y2="8"/>
        <line x1="13.5" y1="8" x2="15" y2="8"/>
        <line x1="3.1" y1="3.1" x2="4.2" y2="4.2"/>
        <line x1="11.8" y1="11.8" x2="12.9" y2="12.9"/>
        <line x1="3.1" y1="12.9" x2="4.2" y2="11.8"/>
        <line x1="11.8" y1="4.2" x2="12.9" y2="3.1"/>`;
    }
  }
</script>

</body>
</html>
